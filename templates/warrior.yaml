# Warrior — clone of druid.yaml adapted for the Warrior class.
# See spec/design.md §3 (value), §4 (beats), §8 (prompt anatomy).

class: warrior
display_name: Warrior
value: "Courage in protecting others — strength used in service, not domination"

palette:
  lighting: "dawn light cutting through battle smoke, cold steel highlights, warm hearth fires in shadow"
  colors: "burnished steel grays, banner crimson, deep oxblood, hints of antique gold"

costume: "polished chainmail beneath a sleeveless tabard bearing a heraldic sigil, well-worn leather pauldrons, broadsword sheathed at the hip, sturdy round shield slung across the back, traveling boots, gender-neutral silhouette"

hero_card_reference: refs/warrior_hero.png

tokens:
  universal_translated:
    - hometown_landmark
    - fear_image
    - quality_symbol
  class_specific:
    - someone_to_protect   # e.g., "younger sibling", "a forest", "people who can't speak for themselves"

panels:
  - n: 1
    emotion: neutral
    position: front
    scene: "{camper_name} in modern everyday clothes, standing in an ordinary contemporary setting, looking unremarkable but solid, soft natural daylight"
    composition: "medium shot, eye-level, neutral expression"
    caption: "Before the call, there was only the ordinary world."

  - n: 2
    emotion: surprise
    position: front
    scene: "{camper_name} hears a distant horn call rolling out from {hometown_landmark}, a battle standard unfurling itself in the wind, a glow on the horizon"
    composition: "wide shot, camper small in frame, banner and horizon dominant"
    caption: "But somewhere, a horn was calling their name."

  - n: 3
    emotion: neutral
    position: front
    scene: "{camper_name} stepping forward as armor materializes around them piece by piece, half ordinary clothes and half plate and chainmail, mid-transformation, sparks of forge-light around them"
    composition: "three-quarter shot, forward stride into frame"
    caption: "Each step became an oath. Each oath became armor."

  - n: 4
    emotion: joy
    position: front
    scene: "{camper_name} in full warrior regalia, heroic stance atop a ridge at dawn, broadsword planted point-down before them, shield on arm, banner snapping in the wind behind, full transformation reveal"
    composition: "full body hero shot, low angle, cinematic lighting"
    caption: "And the watchtowers lit, one by one, in answer."

  - n: 5
    emotion: neutral
    position: profile
    scene: "vast embattled realm with distant fortresses, smoke on the horizon, a marching road winding toward conflict, {camper_name} walking the road, small in frame, world dominant"
    composition: "extreme wide establishing shot, camper as small silhouette"
    caption: "The road was long, and many had walked it before."

  - n: 6
    emotion: neutral
    position: front
    scene: "{camper_name} meeting an old battle-scarred mentor — a veteran with kind eyes and worn armor — laying a hand on the warrior's shoulder, an unspoken understanding passing between them"
    composition: "medium shot, two-figure framing, warm dawn light"
    caption: "The veteran spoke not of victories, but of those they had saved."

  - n: 7
    emotion: fear
    position: front
    scene: "{camper_name} faces the challenge — {fear_image} — towering and menacing across a valley, threatening {someone_to_protect} behind the warrior, who stands resolute between threat and innocent"
    composition: "wide shot, obstacle dominating background, warrior in foreground guarding"
    caption: "The road forked: become the threat, or become the wall."

  - n: 8
    emotion: fear
    position: front
    scene: "{camper_name} attempting to defeat the threat with brute strength alone — sword raised, charging in — and being overwhelmed, knocked back, breathless"
    composition: "dynamic action shot, struggle visible, warrior off-balance"
    caption: "Strength used for its own sake had a short reach."

  - n: 9
    emotion: neutral
    position: front
    scene: "{camper_name} standing braced with shield raised high, planted firmly between the threat and {someone_to_protect}, taking the blow on the shield, no sword swung — only protection, eyes calm and certain"
    composition: "medium shot, shield-bearing pose, defensive heroic"
    caption: "The shield was the answer. Not the sword. Never the sword."

  - n: 10
    emotion: joy
    position: profile
    scene: "{camper_name} lowering the shield as the threat retreats or dissolves, no triumph on their face — only quiet steadiness, those they protected gathering safely behind them"
    composition: "medium shot, calm aftermath, protected figures visible"
    caption: "Triumph wore the quiet shape of a held line."

  - n: 11
    emotion: neutral
    position: front
    scene: "{camper_name} in a sunlit courtyard receiving a glowing {quality_symbol} from the veteran mentor, both figures haloed in dawn light, ceremonial stillness, the banner above them"
    composition: "medium two-shot, ceremonial composition, vertical light"
    caption: "The greatest sword they ever carried was never drawn."

  - n: 12
    emotion: joy
    position: front
    scene: "{camper_name} back in their modern everyday clothes in the same ordinary contemporary setting as panel 1 — but standing a little taller, wearing a small pewter pin shaped like a shield on their chest, gaze level and steady"
    composition: "medium shot, eye-level, mirror of panel 1, calm strength"
    caption: "Home was the same. Only they had changed."

cover:
  emotion: neutral
  position: profile
  pose_directive: "heroic full-body portrait in full warrior regalia, sword planted point-down before them, shield on arm, banner snapping behind, dawn light breaking on the horizon, generous empty sky at the top of the frame for title text overlay"

fallbacks:
  1:  "A young person in modern everyday clothes standing in a quiet outdoor setting, solid posture, soft natural light"
  2:  "A glowing battle standard unfurling itself in the wind on a hilltop at dawn, distant horn call atmosphere"
  3:  "A young figure stepping forward as armor materializes around them, half-transformed into a warrior, forge sparks swirling"
  4:  "A warrior in full plate and chainmail standing heroically on a ridge at dawn, sword planted before them, banner behind"
  5:  "A vast embattled realm with distant fortresses and smoke on the horizon, a tiny figure walking a marching road"
  6:  "A young warrior meeting a battle-scarred veteran mentor in a sunlit camp"
  7:  "A warrior standing braced between an innocent figure and a looming menacing threat across a valley"
  8:  "A warrior attempting to charge a magical threat with sword raised, being knocked back, off-balance"
  9:  "A warrior with shield raised high, planted between a threat and those they protect, taking the blow on the shield"
  10: "A warrior lowering the shield as a dissolved threat retreats, calm and steady"
  11: "A warrior receiving a glowing pin or token from a veteran mentor in a sunlit courtyard"
  12: "A young person back in modern clothes wearing a small shield-shaped pin, in an ordinary contemporary setting, standing tall"
