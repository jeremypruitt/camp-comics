# Druid — canonical 15-panel class arc template (ADR-0007).
# See spec/design.md §3 (value), §4 (beats), §8 (prompt anatomy).
#
# Tone (v2): D&D-campaign-narrator voice — punchy, situational, slightly
# humorous, action-forward. Not mythic-Joseph-Campbell. Dice-table feel.
#
# Layout (ADR-0007):
#   Act 1 / page 2: panels 1–6 — two squares, P-in triptych (panels 3–5),
#                   hero splash. Captioned panels: 1, 2, 6. Triptych panels
#                   3, 4, 5 are captionless (Watchmen-style).
#   Act 2 / page 3: panels 7–11 — forest splash, 3-up middle band, kneeling
#                   close-up. All captioned.
#   Act 3 / page 4: panels 12–15 — H-out triptych (panels 12–14), kitchen
#                   return splash. Captioned panels: 15. Triptych panels
#                   12, 13, 14 are captionless.
#
# Prop / through-line (ADR-0007): sprig of green leaves + carved-wood pendant.
# Mentor hands it over GLOWING at panel 8. Carries through act 2 in some panels.
# Glowing in panel 12 (H-out left bookend), visibly dimming in panel 13 (H-out
# middle close-up), mundane in panel 14 (H-out right bookend) and panel 15.

class: druid
display_name: Druid
value: "Listening before acting — attunement to others and the world"

palette:
  lighting: "warm golden-hour light filtering through forest canopy, soft volumetric god-rays, dappled forest shadows"
  colors: "deep mossy greens, amber, weathered bronze, ochre, hints of bioluminescent teal"

costume: "weathered leather and bark armor stitched with living vines, an antler circlet woven into the hair, gnarled oak quarterstaff with a glowing emerald gem at its tip, gender-neutral silhouette, sturdy travel boots"

hero_card_reference: refs/druid_hero.png

tokens:
  universal_translated:
    - hometown_landmark
    - fear_image
    - quality_symbol
  class_specific:
    - animal_companion

panels:
  - n: 1
    emotion: neutral
    position: front
    scene: "{camper_name} in modern everyday clothes, in an ordinary contemporary kitchen or living room on an unremarkable afternoon, surrounded by Tuesday-ish detail (a mug, sneakers by the door, ordinary light)"
    composition: "intimate eye-level medium shot, camper centered in a SQUARE frame, ordinary domestic detail visible around them, calm balanced composition"
    caption: "It was Tuesday. Nothing interesting was happening. Yet."
    # Pre-transformation — peel the druid costume + hero ref off this panel
    # the same way panel 15 does for the return-home beat. Without these
    # overrides the Costume: line + STYLE_SUFFIX "match the second reference"
    # cue drag druid regalia into a scene that's supposed to be everyday.
    costume_override: "ordinary modern everyday clothes — exactly the casual contemporary outfit the camper is wearing in the FIRST reference image (their photograph). NOT druid regalia, NOT fantasy armor. The camper has not yet been transformed and is in their normal Tuesday-afternoon clothes."
    style_override: "OVERRIDE FOR THIS PANEL ONLY: the camper is in their pre-transformation everyday state. The FIRST reference image (the camper's photograph) is the canonical source for BOTH face AND clothing in this panel. PRESERVE facial structure, eye color and shape, nose, jawline, mouth, skin tone, hair color, and hairstyle EXACTLY as in the FIRST reference — face fidelity is non-negotiable. Match clothing exactly to the FIRST reference too, NOT to the SECOND reference (the druid hero card). Do NOT include any fantasy armor, vines, antler circlet, quarterstaff, or druid attire — the transformation has not happened yet. Plain modern everyday clothing only."

  - n: 2
    emotion: surprise
    position: front
    scene: "a stag made of living moss and starlight steps out from {hometown_landmark}, towering and glowing softly, looking down at {camper_name} with knowing eyes"
    composition: "TALL PORTRAIT composition, magical stag dominating the upper two-thirds of the vertical frame, {camper_name} small at the bottom looking up, dramatic vertical negative space"
    caption: "A stag made of stars stepped out of the everyday."

  - n: 3
    emotion: neutral
    position: profile
    scene: "{camper_name} in modern everyday clothes, mid-stride, stepping forward through a threshold of soft golden light, one foot in an ordinary doorway, the other already on glowing moss, expression curious-but-determined"
    composition: "wide profile mid-stride, hero on the left third moving rightward, motion forward, the everyday giving way to forest light"
    # Triptych panel — no caption (ADR-0007 Watchmen-style).
    # P-in left bookend uses OLD-P1 face/clothing overrides so the transformation
    # hasn't visibly started yet. STYLE_SUFFIX's "match the second reference" cue
    # would otherwise pull druid regalia in before the triptych middle.
    costume_override: "ordinary modern everyday clothes — exactly the casual contemporary outfit the camper is wearing in the FIRST reference image (their photograph). NOT druid regalia, NOT fantasy armor. The transformation has not visibly started; they have only just begun stepping forward."
    style_override: "OVERRIDE FOR THIS PANEL ONLY: the camper is mid-stride through a threshold from everyday into the magical. The FIRST reference image (the camper's photograph) is the canonical source for BOTH face AND clothing here. PRESERVE facial structure, eye color and shape, nose, jawline, mouth, skin tone, hair color, and hairstyle EXACTLY as in the FIRST reference — face fidelity is non-negotiable. Match clothing exactly to the FIRST reference (everyday clothes), NOT to the SECOND reference (the druid hero card). Do NOT include any fantasy armor, vines, antler circlet, quarterstaff, or druid attire — the transformation has not happened yet."

  - n: 4
    emotion: neutral
    position: front
    scene: "extreme close-up of {camper_name}'s hand at the moment of transformation — living vines wrapping the wrist, bark beginning to form across the knuckles, an emerald spark catching at the fingertips"
    composition: "tight macro shot of one hand and forearm, shallow depth of field, face out of frame entirely, magical particles in focus"
    # Triptych middle — no caption (ADR-0007). Hand-only framing means
    # STYLE_SUFFIX face-fidelity language does not fight the composition;
    # no overrides needed.

  - n: 5
    emotion: joy
    position: profile
    scene: "{camper_name} in full druid regalia, mid-stride, stepping out of the threshold light onto the moss-covered forest floor on the far side, the everyday doorway dissolving behind, oak quarterstaff in hand, emerald gem catching the new light"
    composition: "wide profile mid-stride, hero moving rightward into the forest realm, motion forward, fantasy world opening on the right"
    # Triptych right bookend — no caption (ADR-0007).
    # Default chain handles the regalia: prior panel is the triptych middle
    # (hand close-up) which doesn't carry costume, and the hero card ref
    # anchors the full druid silhouette. No overrides needed.

  - n: 6
    emotion: joy
    position: front
    scene: "{camper_name} in full druid regalia, standing atop a moss-covered ancient stone in the middle of a vast forest clearing, oak quarterstaff raised, sunlight breaking through the canopy in sweeping rays, woodland creatures emerging on either side, the wider forest stretching out behind"
    composition: "WIDE CINEMATIC HERO SPLASH, full body but framed wide like a movie poster, low angle from below, sweeping landscape composition with dramatic sky on either side of the figure, hero centered with epic environment"
    caption: "Class: Druid. Stats: locked. The forest got a new friend."

  - n: 7
    emotion: neutral
    position: profile
    scene: "a vast ancient forest realm with towering trees and shafts of golden light, {camper_name} a tiny silhouette on a winding root-path far below, floating spores and glowing mushrooms in the distance"
    composition: "bird's-eye / high-angle aerial shot looking down at the forest canopy, camper a small figure, world overwhelmingly dominant"
    caption: "The map was big. The map is always big."

  - n: 8
    emotion: neutral
    position: front
    scene: "an ancient tree-spirit guide with a weathered bark face and moss-covered shoulders sits across from {camper_name}, their {animal_companion} companion curled between them, the tree-spirit extending both hands forward to offer a glowing emerald-lit sprig of green leaves and a carved-wood pendant, gold-and-green light spilling outward from the gift, warm reverent firelight"
    composition: "intimate two-shot close, both faces in frame at eye-level, the gift centered between them, warm soft-focus forest background, sense of a ceremonial handoff"
    caption: "Tree-spirit handed over the quest gear. Probably important."

  - n: 9
    emotion: fear
    position: front
    scene: "{fear_image} — massive and impassable across a forest clearing, blocking the path entirely; {camper_name} stands small in the foreground with {animal_companion}, looking up at the obstacle"
    composition: "dramatic low angle from behind and below the camper, obstacle towering and filling most of the frame, camper small in lower-third"
    caption: "Something massive sat in the road. Of course it did."

  - n: 10
    emotion: fear
    position: front
    scene: "{camper_name}'s hands gripping the quarterstaff white-knuckled, magical emerald sparks fizzling weakly at the staff's tip, sweat on the brow, strain visible"
    composition: "tight action mid-shot focused on hands, staff, and lower face — close enough to see the strain, side-lit"
    caption: "Plan A was to push it. Plan A was wrong."

  - n: 11
    emotion: neutral
    position: front
    scene: "cinematic close-up of {camper_name}'s face, eyes closed, serene, kneeling — leaves falling slowly past on both sides, soft glowing emerald leylines reflected on the cheekbones, ambient forest details blurred at the edges of the wide frame"
    composition: "WIDE CINEMATIC extreme close-up on the face, eyes closed centered in a horizontal letterbox frame, very shallow focus, intimate but cinematic — the kind of close-up a film would hold on"
    caption: "Knelt down. The forest told the druid where to go."

  - n: 12
    emotion: joy
    position: profile
    scene: "{camper_name} in full druid regalia, mid-stride leaving the forest path, the emerald-lit sprig of leaves and the carved-wood pendant glowing softly in one hand, warm dappled forest light fading behind, expression peaceful-but-aware"
    composition: "wide profile mid-stride, hero on the left third moving rightward, the glowing prop catching focus in the hand, motion forward, fantasy realm receding behind"
    # Triptych left bookend — no caption (ADR-0007). Default chain works:
    # prior panel (new-P11, druid regalia) + hero card pull the costume.

  - n: 13
    emotion: neutral
    position: front
    scene: "extreme close-up of {camper_name}'s hand cradling the sprig of green leaves and the carved-wood pendant at the exact instant the emerald glow visibly DIMS to ordinary leaf-green and ordinary wood-brown, the magical light fading out across the fingertips, a few last emerald motes drifting away"
    composition: "tight macro shot of one hand and the prop, shallow depth of field, face out of frame entirely, focus pulled to the moment of transformation back to mundane"
    # Triptych middle — no caption (ADR-0007). Hand-only framing means
    # STYLE_SUFFIX face-fidelity language does not fight the composition;
    # no overrides needed.

  - n: 14
    emotion: joy
    position: profile
    scene: "{camper_name} back in their modern everyday clothes, mid-stride at the threshold of their kitchen doorway, one foot on the porch, the other already inside, holding the now-mundane sprig of green leaves and a small carved-wood pendant at the throat, ordinary afternoon light, faint knowing smile"
    composition: "wide profile mid-stride, hero on the right third moving leftward into the everyday, motion forward (into the kitchen), fantasy realm fully gone behind"
    # Triptych right bookend — no caption (ADR-0007).
    # Mirror beat to new-P3 — return to everyday clothes. Chain off panel 01
    # (everyday clothes) instead of the default most-recent (panel 13, hand
    # close-up + the regalia chain), and override "match previous costume"
    # so the model doesn't carry the bark-and-vines armor into the threshold.
    reference_panel: "01"
    costume_override: "ordinary modern everyday clothes — exactly the casual contemporary outfit the camper wore in Panel 01 (the third reference image). NOT druid regalia. They carry one small souvenir from the quest as a callback: a single sprig of green leaves in hand and a small carved-wood pendant at the neck. The leaves and pendant are mundane now (no glow)."
    style_override: "OVERRIDE FOR THIS PANEL ONLY: the camper is at the threshold returning home. They are back in their original modern everyday clothes that match the FIRST reference image (photograph) and the THIRD reference image (Panel 01, their everyday self at the start). PRESERVE facial structure, eye color and shape, nose, jawline, mouth, skin tone, hair color, and hairstyle EXACTLY as in the FIRST reference — face fidelity is non-negotiable. Do NOT include fantasy armor, vines, bark or moss accents, antler circlet, quarterstaff, or any other druid's regalia. Only the small sprig of leaves and the small carved-wood pendant as mundane callbacks from the quest."

  - n: 15
    emotion: joy
    position: front
    scene: "{camper_name} back in their modern everyday clothes, in the same ordinary kitchen as panel 1 — same mug on the counter, same window — but now holding a single small sprig of green leaves, wearing a small carved-wood pendant at their throat, the kitchen extending out wide on either side, faint knowing smile"
    composition: "WIDE CINEMATIC mirror of panel 1's framing but in a horizontal letterbox, eye-level, camper centered with the everyday environment extending on both sides — same kitchen, wider lens, balanced quiet composition"
    caption: "Same Tuesday kitchen. Smaller world. Bigger druid."
    # Mirror beat — return to everyday life. Chain off panel 01 (everyday
    # clothes) instead of the default most-recent (panel 14, also everyday
    # but profile mid-stride at a threshold). The override block was the
    # OLD-P12 override; carries forward unchanged.
    reference_panel: "01"
    costume_override: "ordinary modern everyday clothes — exactly the casual contemporary outfit the camper wore in Panel 01 (the third reference image). NOT druid regalia. They may carry one small souvenir from the quest as a callback: a single sprig of green leaves in hand and a small carved-wood pendant at the neck."
    style_override: "OVERRIDE FOR THIS PANEL ONLY: the camper has returned home. They are back in their original modern everyday clothes that match the FIRST reference image (photograph) and the THIRD reference image (Panel 01, their everyday self at the start). PRESERVE facial structure, eye color and shape, nose, jawline, mouth, skin tone, hair color, and hairstyle EXACTLY as in the FIRST reference — face fidelity is non-negotiable. Do NOT include fantasy armor, vines, bark or moss accents, antler circlet, quarterstaff, or any other druid's regalia. Only the small sprig of leaves and the small carved-wood pendant as callbacks from the quest."

cover:
  emotion: neutral
  position: profile
  pose_directive: "heroic full-body portrait in full druid regalia, dramatic action stance, quarterstaff held diagonally across body, dappled forest light from above and behind, leaves swirling, generous empty sky and canopy at the top of the frame for title text overlay"

fallbacks:
  1:  "A young person in modern everyday clothes in an ordinary contemporary kitchen, soft natural light"
  2:  "A glowing magical stag of moss and starlight on a hillside at dusk, ethereal and serene"
  3:  "A young person in everyday clothes stepping through a threshold of golden light, profile mid-stride"
  4:  "Extreme close-up of a hand with vines and bark beginning to form, emerald magical sparks"
  5:  "A druid in full regalia stepping out into a forest realm, profile mid-stride, emerald gem catching light"
  6:  "A druid in full regalia standing heroically on a moss-covered stone, low-angle, sun breaking through canopy"
  7:  "Bird's-eye view of a vast forest with a tiny figure on a winding root-path far below"
  8:  "Intimate two-shot of a druid and an old tree-spirit in conversation, a glowing sprig of leaves and a carved-wood pendant offered between them"
  9:  "Low angle of a small druid figure looking up at a towering magical obstacle blocking a forest clearing"
  10: "Tight close-up of hands gripping a quarterstaff with sparks fizzling, sweat and strain visible"
  11: "Extreme close-up of a serene face with eyes closed, leaf falling past, emerald glow on cheekbones"
  12: "A druid in full regalia walking out of a forest path, glowing sprig and pendant in hand, profile mid-stride"
  13: "Extreme close-up of a hand cradling a sprig of green leaves and a carved-wood pendant, the emerald glow visibly fading to ordinary"
  14: "A young person back in everyday clothes at a kitchen threshold mid-stride, mundane sprig of leaves in hand, faint smile"
  15: "A young person back in modern clothes in the same kitchen, holding a small sprig of leaves, faint smile"
