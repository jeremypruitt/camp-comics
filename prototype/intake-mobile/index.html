<!DOCTYPE html>
<!--
  PROTOTYPE — Camp Comics iPhone intake + template-driven capture flow.

  Question being answered: does the (intake form → derived capture plan →
  guided multi-shot capture) UX actually feel right on a phone? Three radically
  different variants of the capture flow; swipe between them via the bottom bar.

  Throwaway. Once a variant wins, fold it into the real SwiftUI app per the
  PRD at docs/prd/iphone-intake.md. Until then this lives in prototype/.

  Run:  python3 -m http.server -d prototype/intake-mobile 8000
  Phone: open http://<mac-lan-ip>:8000 in Safari (same WiFi).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0d0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Camp Comics — intake prototype</title>
  <style>
    :root {
      --bg: #0d0d10;
      --bg-2: #17171d;
      --bg-3: #22222b;
      --fg: #f4f3ee;
      --fg-dim: #9b9aa3;
      --accent: #d4a017;
      --accent-2: #4e8c5a;
      --danger: #d4503d;
      --radius: 14px;
      --pad: 16px;
      --safe-bot: env(safe-area-inset-bottom, 0);
      --safe-top: env(safe-area-inset-top, 0);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); }
    body { overscroll-behavior-y: contain; -webkit-text-size-adjust: 100%; }

    #app {
      min-height: 100vh;
      padding-bottom: calc(80px + var(--safe-bot));
      padding-top: var(--safe-top);
    }

    /* Shared atoms */
    .container { padding: var(--pad); max-width: 480px; margin: 0 auto; }
    h1, h2, h3 { margin: 0 0 12px; line-height: 1.2; }
    h1 { font-size: 28px; letter-spacing: -0.02em; }
    h2 { font-size: 22px; letter-spacing: -0.01em; }
    h3 { font-size: 17px; font-weight: 600; }
    p { margin: 0 0 10px; color: var(--fg-dim); line-height: 1.45; }
    .muted { color: var(--fg-dim); font-size: 13px; }
    .pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      background: var(--bg-3); color: var(--fg-dim); font-size: 12px;
      margin-right: 6px; margin-bottom: 6px;
    }
    .pill.accent { background: rgba(212, 160, 23, 0.18); color: var(--accent); }
    .pill.done { background: rgba(78, 140, 90, 0.22); color: #8fd3a0; }

    button, .btn {
      appearance: none; border: none; cursor: pointer;
      font: inherit; font-weight: 600; color: var(--fg);
      background: var(--bg-3); padding: 14px 18px; border-radius: var(--radius);
      width: 100%; font-size: 17px;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    button:active, .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #18130a; }
    .btn-secondary { background: var(--bg-3); }
    .btn-ghost { background: transparent; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row > button { flex: 1; }

    input[type=text], textarea, select {
      width: 100%; appearance: none; -webkit-appearance: none;
      background: var(--bg-2); color: var(--fg); border: 1px solid var(--bg-3);
      padding: 13px 14px; border-radius: var(--radius); font: inherit; font-size: 16px;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 14px; }

    /* Class picker */
    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .class-card {
      background: var(--bg-2); border: 2px solid transparent; border-radius: var(--radius);
      padding: 14px; cursor: pointer; text-align: left;
    }
    .class-card.selected { border-color: var(--accent); background: var(--bg-3); }
    .class-card h3 { margin: 0 0 4px; }
    .class-card .plan { font-size: 12px; color: var(--fg-dim); }

    /* Variant switcher */
    #variant-switcher {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(12px + var(--safe-bot));
      background: rgba(34, 34, 43, 0.92); backdrop-filter: blur(10px);
      border: 1px solid #3a3a44; border-radius: 999px;
      padding: 6px; display: flex; align-items: center; gap: 4px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      z-index: 100; font-size: 13px;
    }
    #variant-switcher button {
      background: transparent; border: none; padding: 6px 10px; width: auto;
      color: var(--fg); font-size: 16px; border-radius: 999px;
    }
    #variant-switcher .label {
      padding: 6px 10px; color: var(--fg);
      min-width: 120px; text-align: center;
    }
    #variant-switcher .label small { color: var(--fg-dim); font-size: 11px; display: block; }

    /* === VARIANT A — Story cards === */
    .story-card {
      position: relative;
      min-height: calc(100vh - 80px - var(--safe-bot) - var(--safe-top));
      padding: var(--pad);
      display: flex; flex-direction: column; justify-content: space-between;
      background: linear-gradient(160deg, #2a1d10 0%, #0d0d10 60%);
    }
    .story-card .dots {
      display: flex; gap: 6px; justify-content: center; padding-top: 8px;
    }
    .story-card .dots span {
      width: 6px; height: 6px; border-radius: 3px; background: #3a3a44;
      transition: all 0.2s ease;
    }
    .story-card .dots span.active { width: 24px; background: var(--accent); }
    .story-card .dots span.done { background: var(--accent-2); }
    .story-card .prompt-area { text-align: center; padding: 24px 0; }
    .story-card .emotion-tag { font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
    .story-card .prompt {
      font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
      margin: 12px 0 8px; line-height: 1.1;
    }
    .story-card .sub { color: var(--fg-dim); font-size: 16px; }
    .story-card .preview-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      border: 2px dashed #3a3a44; border-radius: 24px;
      margin: 16px 0; min-height: 220px; overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }
    .story-card .preview-area img { max-width: 100%; max-height: 100%; border-radius: 20px; }
    .story-card .preview-area .placeholder { color: var(--fg-dim); font-size: 60px; }

    /* === VARIANT B — Checklist === */
    .checklist { padding: var(--pad); }
    .checklist .summary {
      background: var(--bg-2); padding: 14px; border-radius: var(--radius); margin-bottom: 16px;
    }
    .checklist .summary .progress {
      display: flex; gap: 4px; margin-top: 10px;
    }
    .checklist .summary .progress .seg {
      flex: 1; height: 6px; border-radius: 3px; background: var(--bg-3);
    }
    .checklist .summary .progress .seg.done { background: var(--accent-2); }
    .checklist .row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-2); padding: 14px; border-radius: var(--radius);
      margin-bottom: 8px; cursor: pointer;
    }
    .checklist .row.done { background: var(--bg-3); }
    .checklist .row .thumb {
      width: 56px; height: 56px; border-radius: 10px;
      background: var(--bg-3); display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0; overflow: hidden;
    }
    .checklist .row .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .checklist .row .info { flex: 1; min-width: 0; }
    .checklist .row .info h3 { margin: 0; }
    .checklist .row .info p { margin: 2px 0 0; font-size: 13px; color: var(--fg-dim); }
    .checklist .row .status { font-size: 22px; }
    .checklist .row.done .status { color: var(--accent-2); }

    /* === VARIANT C — Coach === */
    .coach {
      min-height: calc(100vh - 80px - var(--safe-bot) - var(--safe-top));
      padding: var(--pad);
      display: flex; flex-direction: column;
      background: radial-gradient(ellipse at top, #1f1f2a 0%, #0d0d10 70%);
    }
    .coach .progress-text {
      text-align: center; color: var(--fg-dim); font-size: 12px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 16px 0;
    }
    .coach .progress-dots {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 32px;
    }
    .coach .progress-dots span {
      width: 10px; height: 10px; border-radius: 5px; background: var(--bg-3);
    }
    .coach .progress-dots span.done { background: var(--accent-2); }
    .coach .progress-dots span.current { background: var(--accent); transform: scale(1.3); }
    .coach .body {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
    }
    .coach .emoji-big {
      font-size: 88px; margin-bottom: 16px;
    }
    .coach .title { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .coach .desc { font-size: 18px; color: var(--fg-dim); padding: 0 12px; }
    .coach .preview {
      width: 220px; height: 220px; border-radius: 110px; margin: 24px auto;
      background: var(--bg-2); border: 3px solid var(--bg-3);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .coach .preview img { width: 100%; height: 100%; object-fit: cover; }
    .coach .footer { margin-top: 16px; }

    /* Modal-ish review for variant B */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
      display: flex; align-items: center; justify-content: center;
      padding: var(--pad); z-index: 50;
    }
    .modal {
      background: var(--bg-2); border-radius: 24px; padding: var(--pad);
      width: 100%; max-width: 380px;
    }
    .modal img { width: 100%; border-radius: 14px; margin-bottom: 12px; }

    /* Hidden file input */
    .file-trigger {
      position: relative; display: block; width: 100%;
    }
    .file-trigger input[type=file] {
      position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
    }

    .divider { height: 1px; background: var(--bg-3); margin: 16px 0; }

    /* Done screen */
    .done-card { background: var(--bg-2); padding: 18px; border-radius: var(--radius); margin: 10px 0; }
    .done-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-grid > div { aspect-ratio: 1; background: var(--bg-3); border-radius: 10px; overflow: hidden; }
    .photo-grid img { width: 100%; height: 100%; object-fit: cover; }
    .photo-grid .tag { padding: 6px; font-size: 11px; color: var(--fg-dim); }

    /* Camera overlay for "fake live preview" — uses native file input behind the scenes */
    .skip-link { text-align: center; padding: 12px; }
    .skip-link a { color: var(--accent); text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <main id="app"></main>
  <nav id="variant-switcher" aria-label="prototype variant switcher"></nav>

<script>
"use strict";

// ============================================================================
// DATA — class templates with the new (emotion, position) fields per panel.
// Hand-tagged from spec/design.md beats + the actual druid.yaml content.
// ============================================================================

const TEMPLATES = {
  druid: {
    name: "Druid",
    blurb: "Listening before acting. Solutions from observation, not force.",
    palette: "warm forest greens, amber, mossy bronze",
    panels: [
      { n: 1,  beat: "Everyday self",         emotion: "neutral",  position: "front" },
      { n: 2,  beat: "Stag of stars appears", emotion: "surprise", position: "front" },
      { n: 3,  beat: "Hand transforming",     emotion: "neutral",  position: "front" },
      { n: 4,  beat: "Hero reveal",           emotion: "joy",      position: "front" },
      { n: 5,  beat: "Vast forest realm",     emotion: "neutral",  position: "profile" },
      { n: 6,  beat: "Tree spirit guide",     emotion: "neutral",  position: "front" },
      { n: 7,  beat: "Fear made manifest",    emotion: "fear",     position: "front" },
      { n: 8,  beat: "First attempt fails",   emotion: "fear",     position: "front" },
      { n: 9,  beat: "Kneel, listen",         emotion: "neutral",  position: "front" },
      { n: 10, beat: "Walking past obstacle", emotion: "joy",      position: "profile" },
      { n: 11, beat: "Receiving the reward",  emotion: "neutral",  position: "front" },
      { n: 12, beat: "Return home",           emotion: "joy",      position: "front" },
    ],
    cover: { emotion: "neutral", position: "profile" },
  },

  // A second, deliberately-simpler template so the user can see the capture
  // plan visibly change with class. Not the real wizard.yaml — sketched for
  // the prototype.
  wizard: {
    name: "Wizard",
    blurb: "Curiosity, and the patience to learn.",
    palette: "deep indigo, silver, candlelight gold",
    panels: [
      { n: 1,  beat: "Everyday self",         emotion: "neutral",  position: "front" },
      { n: 2,  beat: "A question intrudes",   emotion: "surprise", position: "front" },
      { n: 3,  beat: "First spell flickers",  emotion: "neutral",  position: "front" },
      { n: 4,  beat: "Hero reveal",           emotion: "joy",      position: "front" },
      { n: 5,  beat: "The grand library",     emotion: "neutral",  position: "front" },
      { n: 6,  beat: "The old master",        emotion: "neutral",  position: "front" },
      { n: 7,  beat: "Riddle appears",        emotion: "neutral",  position: "front" },
      { n: 8,  beat: "Arrogance fails",       emotion: "neutral",  position: "front" },
      { n: 9,  beat: "Humble study",          emotion: "neutral",  position: "front" },
      { n: 10, beat: "Eureka",                emotion: "joy",      position: "front" },
      { n: 11, beat: "The bound tome",        emotion: "neutral",  position: "front" },
      { n: 12, beat: "Return, wiser",         emotion: "neutral",  position: "front" },
    ],
    cover: { emotion: "neutral", position: "profile" },
  },
};

// ============================================================================
// CAPTURE PLAN — pure function, mirrors the PRD's CapturePlanner module.
// ============================================================================

function capturePlan(template) {
  const set = new Map();
  const add = (req) => {
    const key = `${req.emotion}|${req.position}`;
    if (!set.has(key)) set.set(key, { emotion: req.emotion, position: req.position });
  };
  template.panels.forEach(add);
  add(template.cover);
  // Display order: all front-facing first, then profile shots. Within each
  // group, order by emotion for predictability.
  const order = ["neutral", "joy", "surprise", "fear"];
  return [...set.values()].sort((a, b) => {
    if (a.position !== b.position) return a.position === "front" ? -1 : 1;
    return order.indexOf(a.emotion) - order.indexOf(b.emotion);
  });
}

// ============================================================================
// PROMPT COPY — how we describe each (emotion, position) to the player.
// ============================================================================

const PROMPTS = {
  "neutral|front":   { emoji: "🙂", title: "Neutral, looking at me",   sub: "Mouth closed or barely open. Camera at eye level." },
  "joy|front":       { emoji: "😄", title: "Big smile",                sub: "Teeth showing, eyes a little crinkled. Real joy." },
  "fear|front":      { emoji: "😨", title: "Worried, wide-eyed",       sub: "Like something just went wrong. Eyebrows up." },
  "surprise|front":  { emoji: "😲", title: "Surprised!",                sub: "Like you just saw something you didn't expect." },
  "neutral|profile": { emoji: "👤", title: "Turn 45° to the side",     sub: "Whichever side feels natural. Neutral face." },
  "joy|profile":     { emoji: "😏", title: "Side profile with a smile", sub: "45° turn, slight grin, looking off-camera." },
  "fear|profile":    { emoji: "😟", title: "Side profile, looking off", sub: "45° turn, worried expression." },
  "surprise|profile":{ emoji: "😳", title: "Side profile, surprised",   sub: "45° turn, brows up." },
};

function promptFor(req) {
  return PROMPTS[`${req.emotion}|${req.position}`] || { emoji: "📷", title: req.emotion, sub: req.position };
}

// ============================================================================
// STATE — in-memory only. Persistence is what the real app will solve;
// the prototype is about feel.
// ============================================================================

const state = {
  step: "setup",   // setup | capture | done
  variant: "A",
  classKey: "druid",
  player: { name: "", character: "", landmark: "", fear: "", quality: "" },
  plan: [],
  photos: {},      // key "emotion|position" → data URL
  reviewIndex: null, // which shot is currently being reviewed (variant B)
};

// ============================================================================
// RENDER — one mount point, full re-render on state change. It's a prototype.
// ============================================================================

const app = document.getElementById("app");

function render() {
  let html = "";
  if (state.step === "setup") html = renderSetup();
  else if (state.step === "capture") html = renderCapture();
  else if (state.step === "done") html = renderDone();
  app.innerHTML = html;
  bind();
  renderSwitcher();
}

// --- Setup screen (shared across variants) ---

function renderSetup() {
  const plan = capturePlan(TEMPLATES[state.classKey]);
  return `
    <div class="container">
      <h1>New player</h1>
      <p>Intake form. Pick a class to derive the capture plan.</p>

      <label>Player name</label>
      <input type="text" id="f-name" value="${esc(state.player.name)}" placeholder="e.g. Riley" />

      <label>Character name <span class="muted">(optional)</span></label>
      <input type="text" id="f-character" value="${esc(state.player.character)}" placeholder="e.g. Thornroot the Patient" />

      <label>Class</label>
      <div class="class-grid">
        ${Object.entries(TEMPLATES).map(([k, t]) => `
          <button class="class-card ${state.classKey === k ? "selected" : ""}" data-class="${k}">
            <h3>${t.name}</h3>
            <div class="plan">${capturePlan(t).length} photos needed</div>
          </button>
        `).join("")}
      </div>

      <label style="margin-top:18px">Hometown landmark <span class="muted">(raw)</span></label>
      <textarea id="f-landmark" placeholder="e.g. the old lighthouse">${esc(state.player.landmark)}</textarea>

      <label>A fear <span class="muted">(raw)</span></label>
      <textarea id="f-fear" placeholder="e.g. letting my family down">${esc(state.player.fear)}</textarea>

      <label>A quality you want to grow into <span class="muted">(raw)</span></label>
      <textarea id="f-quality" placeholder="e.g. patience">${esc(state.player.quality)}</textarea>

      <div class="divider"></div>

      <h3>Capture plan for ${TEMPLATES[state.classKey].name}</h3>
      <p>Derived from the template — fewest photos that cover every panel.</p>
      <div>
        ${plan.map(req => {
          const p = promptFor(req);
          return `<span class="pill accent">${p.emoji} ${req.emotion} · ${req.position}</span>`;
        }).join("")}
      </div>

      <button class="btn-primary" id="go-capture" style="margin-top:24px">
        Start capture →
      </button>

      <div class="skip-link">
        <a href="#" id="skip-to-done">Skip capture · jump to done screen</a>
      </div>
    </div>
  `;
}

// --- Capture screens (per variant) ---

function renderCapture() {
  if (state.variant === "A") return renderVariantA();
  if (state.variant === "B") return renderVariantB();
  return renderVariantC();
}

function nextRequiredIndex() {
  return state.plan.findIndex(req => !state.photos[`${req.emotion}|${req.position}`]);
}

// VARIANT A — Story cards: one full-bleed card per shot, advance by accept.
function renderVariantA() {
  const idx = nextRequiredIndex();
  if (idx === -1) return renderDoneInline();
  const req = state.plan[idx];
  const p = promptFor(req);
  const key = `${req.emotion}|${req.position}`;
  const captured = state.photos[key];

  return `
    <div class="story-card">
      <div class="dots">
        ${state.plan.map((r, i) => {
          const done = state.photos[`${r.emotion}|${r.position}`];
          const cls = done ? "done" : (i === idx ? "active" : "");
          return `<span class="${cls}"></span>`;
        }).join("")}
      </div>

      <div class="prompt-area">
        <div class="emotion-tag">Shot ${idx + 1} of ${state.plan.length}</div>
        <div class="prompt">${p.title}</div>
        <div class="sub">${p.sub}</div>
      </div>

      <div class="preview-area">
        ${captured
          ? `<img src="${captured}" alt="preview" />`
          : `<div class="placeholder">${p.emoji}</div>`}
      </div>

      ${captured
        ? `<div class="btn-row">
             <button class="btn-secondary" data-action="retake" data-key="${key}">Retake</button>
             <button class="btn-primary" data-action="accept" data-key="${key}">Use this →</button>
           </div>`
        : `<label class="file-trigger">
             <input type="file" accept="image/*" capture="user" data-shot="${key}" />
             <span class="btn btn-primary" style="display:block;text-align:center">Take photo</span>
           </label>`}
    </div>
  `;
}

// VARIANT B — Checklist: see everything at once, capture in any order.
function renderVariantB() {
  const doneCount = state.plan.filter(r => state.photos[`${r.emotion}|${r.position}`]).length;
  const ready = doneCount === state.plan.length;

  let modal = "";
  if (state.reviewIndex !== null) {
    const req = state.plan[state.reviewIndex];
    const key = `${req.emotion}|${req.position}`;
    const captured = state.photos[key];
    if (captured) {
      modal = `
        <div class="modal-backdrop" data-action="close-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <img src="${captured}" alt="preview" />
            <div class="btn-row">
              <button class="btn-secondary" data-action="retake" data-key="${key}">Retake</button>
              <button class="btn-primary" data-action="close-modal">Looks good</button>
            </div>
          </div>
        </div>`;
    }
  }

  return `
    <div class="checklist">
      <div class="summary">
        <h2>${TEMPLATES[state.classKey].name} capture plan</h2>
        <p>${doneCount} of ${state.plan.length} photos · tap any row.</p>
        <div class="progress">
          ${state.plan.map(r => {
            const done = state.photos[`${r.emotion}|${r.position}`];
            return `<div class="seg ${done ? "done" : ""}"></div>`;
          }).join("")}
        </div>
      </div>

      ${state.plan.map((req, i) => {
        const p = promptFor(req);
        const key = `${req.emotion}|${req.position}`;
        const captured = state.photos[key];
        return `
          <label class="row ${captured ? "done" : ""}" data-index="${i}">
            <div class="thumb">
              ${captured ? `<img src="${captured}" />` : p.emoji}
            </div>
            <div class="info">
              <h3>${p.title}</h3>
              <p>${req.emotion} · ${req.position}</p>
            </div>
            <div class="status">${captured ? "✓" : "›"}</div>
            ${captured
              ? ""
              : `<input type="file" accept="image/*" capture="user"
                       data-shot="${key}" style="display:none" />`}
          </label>`;
      }).join("")}

      <button class="btn-primary" id="checklist-submit" ${ready ? "" : "disabled"} style="margin-top:16px;opacity:${ready ? 1 : 0.4}">
        ${ready ? "All set — submit" : `${state.plan.length - doneCount} more to go`}
      </button>

      ${modal}
    </div>
  `;
}

// VARIANT C — Coach: gentle one-at-a-time, big visuals, encouragement.
function renderVariantC() {
  const idx = nextRequiredIndex();
  if (idx === -1) return renderDoneInline();
  const req = state.plan[idx];
  const p = promptFor(req);
  const key = `${req.emotion}|${req.position}`;
  const captured = state.photos[key];

  return `
    <div class="coach">
      <div class="progress-text">${idx + 1} of ${state.plan.length}</div>
      <div class="progress-dots">
        ${state.plan.map((r, i) => {
          const done = state.photos[`${r.emotion}|${r.position}`];
          const cls = done ? "done" : (i === idx ? "current" : "");
          return `<span class="${cls}"></span>`;
        }).join("")}
      </div>

      <div class="body">
        ${captured
          ? `<div class="preview"><img src="${captured}" /></div>
             <div class="title">Looking good?</div>
             <div class="desc">If not, retake. Otherwise, on to the next.</div>`
          : `<div class="emoji-big">${p.emoji}</div>
             <div class="title">${p.title}</div>
             <div class="desc">${p.sub}</div>`}
      </div>

      <div class="footer">
        ${captured
          ? `<div class="btn-row">
               <button class="btn-secondary" data-action="retake" data-key="${key}">Retake</button>
               <button class="btn-primary" data-action="accept" data-key="${key}">Looks good →</button>
             </div>`
          : `<label class="file-trigger">
               <input type="file" accept="image/*" capture="user" data-shot="${key}" />
               <span class="btn btn-primary" style="display:block;text-align:center;font-size:18px">📸  Take photo</span>
             </label>`}
      </div>
    </div>
  `;
}

function renderDoneInline() {
  // After last accept, auto-bump to done step on next tick.
  setTimeout(() => { state.step = "done"; render(); }, 0);
  return `<div class="container"><h2>All shots captured.</h2></div>`;
}

// --- Done screen ---

function renderDone() {
  const tmpl = TEMPLATES[state.classKey];
  return `
    <div class="container">
      <h1>${state.player.name || "Player"} ✓</h1>
      <p>${tmpl.name} · ${state.plan.length} photos captured</p>

      <h3 style="margin-top:18px">Photos</h3>
      <div class="photo-grid">
        ${state.plan.map(req => {
          const key = `${req.emotion}|${req.position}`;
          const captured = state.photos[key];
          const p = promptFor(req);
          return `<div>${captured ? `<img src="${captured}" />` : `<div class="tag">${p.emoji}<br/>${req.emotion}<br/>${req.position}</div>`}</div>`;
        }).join("")}
      </div>

      <h3 style="margin-top:18px">What would happen next in the real app</h3>
      <div class="done-card">
        <p style="margin:0">▸ Run a single Gemini test-gen against <strong>neutral · front</strong> (the QA gate).</p>
      </div>
      <div class="done-card">
        <p style="margin:0">▸ Land back on the dashboard; player is now in the cohort-assignment pool.</p>
      </div>
      <div class="done-card">
        <p style="margin:0">▸ Mid-week: translate the raw tokens into fantasy fragments.</p>
      </div>
      <div class="done-card">
        <p style="margin:0">▸ Days 3–4: per-panel generation pulls the right photo per panel beat via PhotoReferenceResolver.</p>
      </div>

      <button class="btn-secondary" id="restart" style="margin-top:16px">↺  Start over</button>
    </div>
  `;
}

// ============================================================================
// EVENT BINDING — simple delegated handlers, re-attached on every render.
// ============================================================================

function bind() {
  // Form fields (Setup)
  const fields = ["name", "character", "landmark", "fear", "quality"];
  fields.forEach(f => {
    const el = document.getElementById(`f-${f}`);
    if (el) el.addEventListener("input", e => { state.player[f] = e.target.value; });
  });

  // Class cards
  document.querySelectorAll(".class-card").forEach(b => {
    b.addEventListener("click", e => {
      e.preventDefault();
      state.classKey = b.dataset.class;
      render();
    });
  });

  // Skip to done
  const skip = document.getElementById("skip-to-done");
  if (skip) skip.addEventListener("click", e => {
    e.preventDefault();
    state.plan = capturePlan(TEMPLATES[state.classKey]);
    state.step = "done";
    render();
  });

  // Start capture
  const go = document.getElementById("go-capture");
  if (go) go.addEventListener("click", () => {
    state.plan = capturePlan(TEMPLATES[state.classKey]);
    state.photos = {};
    state.step = "capture";
    render();
  });

  // File inputs (camera)
  document.querySelectorAll('input[type="file"][data-shot]').forEach(input => {
    input.addEventListener("change", e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        state.photos[input.dataset.shot] = ev.target.result;
        // For variant B, opening the modal after capture feels right
        if (state.variant === "B") {
          state.reviewIndex = state.plan.findIndex(r =>
            `${r.emotion}|${r.position}` === input.dataset.shot);
        }
        render();
      };
      reader.readAsDataURL(file);
    });
  });

  // Action buttons (accept, retake, close-modal)
  document.querySelectorAll("[data-action]").forEach(b => {
    b.addEventListener("click", e => {
      const action = b.dataset.action;
      const key = b.dataset.key;
      if (action === "retake" && key) {
        delete state.photos[key];
        state.reviewIndex = null;
        render();
      } else if (action === "accept" && key) {
        // Photo already stored; rerender to advance to next shot.
        render();
      } else if (action === "close-modal") {
        state.reviewIndex = null;
        render();
      }
    });
  });

  // Variant B checklist row → trigger the file input inside
  document.querySelectorAll(".checklist .row").forEach(row => {
    row.addEventListener("click", e => {
      // If row is .done, open modal review
      if (row.classList.contains("done")) {
        state.reviewIndex = +row.dataset.index;
        render();
        return;
      }
      // Otherwise trigger file input
      const fi = row.querySelector('input[type="file"]');
      if (fi) fi.click();
    });
  });

  const submit = document.getElementById("checklist-submit");
  if (submit) submit.addEventListener("click", () => {
    if (state.plan.every(r => state.photos[`${r.emotion}|${r.position}`])) {
      state.step = "done";
      render();
    }
  });

  // Restart
  const restart = document.getElementById("restart");
  if (restart) restart.addEventListener("click", () => {
    state.step = "setup";
    state.photos = {};
    render();
  });
}

// ============================================================================
// VARIANT SWITCHER — floating bottom bar, ←/→ keys, ?variant= URL param.
// ============================================================================

const VARIANTS = [
  { key: "A", name: "Story cards" },
  { key: "B", name: "Checklist" },
  { key: "C", name: "Coach" },
];

function renderSwitcher() {
  const cur = VARIANTS.find(v => v.key === state.variant);
  document.getElementById("variant-switcher").innerHTML = `
    <button id="var-prev" aria-label="previous variant">←</button>
    <div class="label">
      ${cur.key} — ${cur.name}
      <small>${state.step}</small>
    </div>
    <button id="var-next" aria-label="next variant">→</button>
  `;
  document.getElementById("var-prev").addEventListener("click", () => cycle(-1));
  document.getElementById("var-next").addEventListener("click", () => cycle(1));
}

function cycle(d) {
  const i = VARIANTS.findIndex(v => v.key === state.variant);
  const next = VARIANTS[(i + d + VARIANTS.length) % VARIANTS.length].key;
  setVariant(next);
}

function setVariant(key) {
  state.variant = key;
  const url = new URL(window.location);
  url.searchParams.set("variant", key);
  window.history.replaceState({}, "", url);
  render();
}

window.addEventListener("keydown", e => {
  if (["INPUT", "TEXTAREA"].includes(e.target.tagName) || e.target.isContentEditable) return;
  if (e.key === "ArrowLeft") cycle(-1);
  if (e.key === "ArrowRight") cycle(1);
});

// ============================================================================
// BOOT
// ============================================================================

function esc(s) {
  return String(s || "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

(function boot() {
  const url = new URL(window.location);
  const v = (url.searchParams.get("variant") || "A").toUpperCase();
  if (VARIANTS.some(x => x.key === v)) state.variant = v;
  render();
})();
</script>
